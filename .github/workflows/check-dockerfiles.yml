name: Check Dockerfiles

on:
  pull_request:
    branches: [ main ]

jobs:
  check-ex1:
    name: "Exercice 1 - Flask"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Dockerfile exists
        run: |
          if [ ! -f exercice-1-flask/Dockerfile ]; then
            echo "❌ Dockerfile manquant dans exercice-1-flask/"
            exit 1
          fi
          echo "✅ Dockerfile trouvé"
      
      - name: Check .dockerignore exists
        run: |
          if [ ! -f exercice-1-flask/.dockerignore ]; then
            echo "⚠️ .dockerignore manquant (recommandé)"
          else
            echo "✅ .dockerignore trouvé"
          fi
      
      - name: Build image
        run: |
          cd exercice-1-flask
          docker build -t hello-flask:test .
      
      - name: Check image size
        run: |
          SIZE=$(docker images hello-flask:test --format "{{.Size}}")
          echo "📦 Taille de l'image : $SIZE"
          
          # Vérifier que l'image fait moins de 200MB
          SIZE_MB=$(docker images hello-flask:test --format "{{.Size}}" | sed 's/MB//')
          if (( $(echo "$SIZE_MB > 200" | bc -l) )); then
            echo "⚠️ Image > 200MB, peut être optimisée"
          else
            echo "✅ Taille acceptable"
          fi
      
      - name: Test container
        run: |
          docker run -d -p 5000:5000 --name test-flask hello-flask:test
          sleep 3
          
          # Tester l'endpoint
          RESPONSE=$(curl -s http://localhost:5000)
          if [[ $RESPONSE == *"Hello Docker"* ]]; then
            echo "✅ Application fonctionne"
          else
            echo "❌ Application ne répond pas correctement"
            exit 1
          fi
          
          docker stop test-flask

  check-ex2:
    name: "Exercice 2 - Weather API"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: |
          cd exercice-2-weather-api
          docker build -t weather-api:test .
      
      - name: Check image uses Alpine
        run: |
          # Vérifier si l'image de base est alpine
          FROM_LINE=$(grep "^FROM" exercice-2-weather-api/Dockerfile)
          if [[ $FROM_LINE == *"alpine"* ]]; then
            echo "✅ Utilise une image Alpine"
          else
            echo "⚠️ N'utilise pas Alpine (image plus lourde)"
          fi
      
      - name: Test API
        run: |
          docker run -d -p 3000:3000 --name test-weather weather-api:test
          sleep 3
          
          RESPONSE=$(curl -s http://localhost:3000/api/weather/paris)
          if [[ $RESPONSE == *"nuageux"* ]]; then
            echo "✅ API fonctionne"
          else
            echo "❌ API ne répond pas correctement"
            exit 1
          fi
          
          docker stop test-weather

  check-ex3:
    name: "Exercice 3 - Stats API"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: |
          cd exercice-3-stats-api
          docker build -t stats-api:test .
      
      - name: Check multistage build
        run: |
          # Compter le nombre de FROM dans le Dockerfile
          FROM_COUNT=$(grep -c "^FROM" exercice-3-stats-api/Dockerfile)
          if [ $FROM_COUNT -ge 2 ]; then
            echo "✅ Multistage build détecté"
          else
            echo "⚠️ Pas de multistage build (exercice 3 le demande)"
          fi
      
      - name: Test API
        run: |
          docker run -d -p 8080:8080 --name test-stats stats-api:test
          sleep 3
          
          RESPONSE=$(curl -s -X POST http://localhost:8080/api/stats/median \
            -H "Content-Type: application/json" \
            -d '{"numbers": [10, 20, 30, 40, 50]}')
          
          if [[ $RESPONSE == *"median"* ]]; then
            echo "✅ Nouvelle fonctionnalité médiane fonctionne"
          else
            echo "❌ Route /api/stats/median ne fonctionne pas"
            exit 1
          fi
          
          docker stop test-stats